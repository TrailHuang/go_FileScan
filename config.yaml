# 文件病毒扫描程序配置
scanner:
  # 监控目录路径
  watch_directories:
    - /home/virus_scan/samples/

  # 学习表文件路径
  learning_table_path: /home/virus_scan/md5hash.txt

  # 隔离配置
  quarantine:
    enabled: true
    path: /home/virus_scan/quarantine/

  # 扫描配置
  scan:
    max_concurrent_scans: 10
    file_size_limit: 100MB
    scan_timeout: 60s

  # 日志配置
  log:
    level: info
    file: /home/virus_scan/scanner.log
    max_size: 100MB
    max_backups: 5
    max_age: 30

# 输出配置
output:
  format: json
  file: /home/virus_scan/scan_results.json
  include_clean_files: false